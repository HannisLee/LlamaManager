<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaManager</title>
    <link rel="icon" href="/icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            padding: 20px 0;
            font-size: 1.8em;
            color: #fff;
            border-bottom: 2px solid #333;
            margin-bottom: 20px;
        }

        .card {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 1.1em;
            color: #aaa;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 错误横幅 */
        #error-bar {
            display: none;
            background: #c62828;
            color: white;
            padding: 10px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        #error-bar button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2em;
            margin-left: 10px;
            cursor: pointer;
        }

        /* 状态徽章 */
        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .badge-running { background: #2e7d32; color: #fff; }
        .badge-stopped { background: #555; color: #ccc; }

        /* 状态信息行 */
        .status-info {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 4px 12px;
            margin: 10px 0;
            font-size: 0.95em;
        }
        .status-info dt { color: #888; }
        .status-info dd {
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            color: #e0e0e0;
            word-break: break-all;
        }

        /* 按钮组 */
        .btn-group { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

        /* 按钮 */
        button, .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary { background: #1565c0; color: #fff; }
        .btn-danger { background: #c62828; color: #fff; }
        .btn-success { background: #2e7d32; color: #fff; }
        .btn-secondary { background: #444; color: #ccc; }
        .btn-warning { background: #e65100; color: #fff; }

        /* 表单 */
        .form-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 8px 12px;
            align-items: center;
        }
        .form-grid label {
            color: #aaa;
            font-size: 0.9em;
            text-align: right;
        }
        .form-grid input,
        .form-grid select,
        .form-grid textarea {
            width: 100%;
            padding: 6px 10px;
            background: #0f1629;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 0.9em;
        }
        .form-grid input:focus,
        .form-grid select:focus,
        .form-grid textarea:focus {
            outline: none;
            border-color: #1565c0;
        }
        .form-grid select option {
            background: #0f1629;
            color: #e0e0e0;
        }

        .full-width { grid-column: 1 / -1; }
        .hidden { display: none; }

        .custom-service-list {
            margin-top: 12px;
            border-top: 1px solid #2f3b52;
            padding-top: 12px;
        }
        .custom-service-list h3 {
            font-size: 0.95em;
            color: #aaa;
            margin-bottom: 8px;
        }
        .custom-service-row {
            display: grid;
            grid-template-columns: minmax(120px, 0.9fr) 70px minmax(220px, 2fr) auto;
            gap: 8px;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #263247;
            font-size: 0.88em;
        }
        .custom-service-row:last-child {
            border-bottom: none;
        }
        .custom-service-row code {
            color: #b7c7df;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }
        .custom-service-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .custom-service-empty {
            color: #7d8ba3;
            font-size: 0.88em;
        }
        .start-feedback {
            display: none;
            margin-top: 10px;
            padding: 8px 10px;
            border: 1px solid #2f3b52;
            border-radius: 4px;
            background: #101b32;
            color: #b7c7df;
            font-size: 0.9em;
        }
        .start-feedback strong {
            color: #e5eefc;
        }

        /* 日志区域 */
        .log-area {
            width: 100%;
            min-height: 180px;
            max-height: 600px;
            height: 320px;
            background: #0a0a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #b0b0b0;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.85em;
            padding: 10px;
            resize: vertical;
            overflow-y: auto;
        }

        /* checkbox */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #1565c0;
        }
        .checkbox-row label {
            color: #aaa;
            font-size: 0.9em;
        }

        /* GPU 监控 */
        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .card-header-row h2 {
            margin-bottom: 0;
        }
        .compact-control {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            font-size: 0.9em;
        }
        .compact-control select {
            padding: 5px 8px;
            background: #0f1629;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
        }
        .gpu-error {
            display: none;
            margin-bottom: 10px;
            padding: 8px 10px;
            border: 1px solid #6d3d16;
            border-radius: 4px;
            background: #2d2118;
            color: #ffb066;
            font-size: 0.9em;
        }
        .gpu-wave-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }
        .gpu-wave-grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .gpu-wave-grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .gpu-wave-grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .gpu-wave-card {
            background: #0f1629;
            border: 1px solid #2f3b52;
            border-radius: 6px;
            padding: 10px;
            min-width: 0;
        }
        .gpu-wave-title {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            color: #dbe6f3;
            font-size: 0.9em;
            margin-bottom: 6px;
        }
        .gpu-wave-title span {
            color: #8fa1bd;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .gpu-wave-canvas {
            width: 100%;
            height: 150px;
            display: block;
            background: #10161d;
            border: 1px solid #263247;
            border-radius: 4px;
        }
        .gpu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }
        .gpu-grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .gpu-grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .gpu-grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .gpu-card {
            background: #0f1629;
            border: 1px solid #2f3b52;
            border-radius: 6px;
            padding: 12px;
            min-width: 0;
        }
        .gpu-card-title {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .gpu-card-title strong {
            color: #fff;
            font-size: 1em;
        }
        .gpu-card-title span {
            color: #8fa1bd;
            font-size: 0.82em;
            word-break: break-word;
            text-align: right;
        }
        .gpu-metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }
        .gpu-metric {
            background: #0a0f1f;
            border: 1px solid #263247;
            border-radius: 4px;
            padding: 7px 8px;
            min-width: 0;
        }
        .gpu-metric label {
            display: block;
            color: #7e8da6;
            font-size: 0.75em;
            line-height: 1.2;
        }
        .gpu-metric span {
            display: block;
            color: #e8edf5;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.95em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .gpu-util-bar {
            height: 12px;
            background: #07100c;
            border: 1px solid #1d3f2b;
            border-radius: 3px;
            overflow: hidden;
        }
        .gpu-util-fill {
            height: 100%;
            background: linear-gradient(90deg, #1b8f4a, #6be675);
            width: 0%;
            transition: width 0.25s;
        }
        .gpu-empty {
            color: #888;
            padding: 14px 0;
            text-align: center;
        }
        .table-wrap {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #2f3b52;
            border-radius: 6px;
            background: #0f1629;
        }
        .gpu-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 820px;
            font-size: 0.88em;
        }
        .gpu-table th,
        .gpu-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #263247;
            text-align: left;
            white-space: nowrap;
        }
        .gpu-table th {
            background: #101b32;
            color: #8fa1bd;
            font-weight: 600;
        }
        .gpu-table td {
            color: #dde5ef;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        }
        .gpu-table tr:last-child td {
            border-bottom: none;
        }

        @media (max-width: 760px) {
            .container { padding: 12px; }
            .custom-service-row {
                grid-template-columns: 1fr;
                align-items: start;
            }
            .custom-service-actions {
                justify-content: flex-start;
            }
            .gpu-wave-grid,
            .gpu-wave-grid.cols-2,
            .gpu-wave-grid.cols-3,
            .gpu-wave-grid.cols-4,
            .gpu-grid,
            .gpu-grid.cols-2,
            .gpu-grid.cols-3,
            .gpu-grid.cols-4 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- 错误横幅 -->
<div id="error-bar">
    <span id="error-text"></span>
    <button onclick="clearError()">&times;</button>
</div>

<div class="container">
    <h1><img src="/icon.png" alt="LlamaManager" style="height:32px;vertical-align:middle;"> LlamaManager</h1>

    <!-- GPU 监控 -->
    <div class="card">
        <div class="card-header-row">
            <h2>GPU 监控</h2>
            <label class="compact-control" for="gpu-cards-per-row">
                Cards per row
                <select id="gpu-cards-per-row" onchange="setGpuCardsPerRow()">
                    <option value="auto">Auto</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </label>
        </div>
        <div id="gpu-error" class="gpu-error"></div>
        <div id="gpu-wave-grid" class="gpu-wave-grid">
            <div class="gpu-empty">正在加载 GPU 波形...</div>
        </div>
        <div id="gpu-grid" class="gpu-grid">
            <div class="gpu-empty">正在加载 GPU 状态...</div>
        </div>
        <div class="table-wrap">
            <table class="gpu-table">
                <thead>
                    <tr>
                        <th>GPU</th>
                        <th>GPU Name</th>
                        <th>GPU Util</th>
                        <th>PID</th>
                        <th>Used Mem</th>
                        <th>Total Mem</th>
                        <th>Temp</th>
                        <th>Model Name</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="gpu-process-body">
                    <tr><td colspan="9" class="gpu-empty">暂无受管进程</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 第二块：启动服务 -->
    <div class="card">
        <h2>启动服务</h2>
        <div class="form-grid">
            <label for="start-model">模型</label>
            <select id="start-model" onchange="onModelChange()">
                <option value="">-- 请先扫描模型 --</option>
            </select>

            <label for="start-port" id="start-port-label">Port</label>
            <input type="number" id="start-port" value="8083">

            <label for="start-extra" id="start-extra-label">Extra Args</label>
            <input type="text" id="start-extra" placeholder="-c 4096 --n-gpu-layers 99 --threads 8">

            <div class="full-width checkbox-row">
                <input type="checkbox" id="start-auto-kill" checked>
                <label for="start-auto-kill">端口被占用时自动 kill 占用进程</label>
            </div>

            <div class="full-width checkbox-row">
                <input type="checkbox" id="start-incremental" checked>
                <label for="start-incremental">增量启动（不停止已有受管实例）</label>
            </div>

            <label>选择 GPU</label>
            <div id="start-gpu-list" style="display:flex; gap:10px; flex-wrap:wrap; color:#aaa; font-size:0.9em;">
                <span style="color:#888;">自动使用全部可见 GPU</span>
            </div>
        </div>
        <div class="btn-group" style="margin-top:12px">
            <button class="btn-success" id="btn-start" onclick="startServer()">Start Server</button>
            <button class="btn-secondary" onclick="toggleCustomServiceForm()">添加自定义服务</button>
        </div>
        <div id="start-feedback" class="start-feedback"></div>
        <div id="custom-service-form" class="form-grid hidden" style="margin-top:14px; border-top:1px solid #2f3b52; padding-top:14px;">
            <input type="hidden" id="custom-service-id">

            <label for="custom-service-name">服务名</label>
            <input type="text" id="custom-service-name" placeholder="Qwen3-ASR-1.7B">

            <label for="custom-service-command">启动命令</label>
            <textarea id="custom-service-command" rows="3" placeholder="conda run -n qwen3-asr qwen-asr-serve /home/lihan/models/Qwen3-ASR-1.7B --gpu-memory-utilization 0.8 --host 0.0.0.0 --port 8085"></textarea>

            <div class="full-width btn-group">
                <button class="btn-primary" id="custom-service-save-btn" onclick="saveCustomService()">保存自定义服务</button>
                <button class="btn-secondary" onclick="toggleCustomServiceForm(false)">取消</button>
            </div>
        </div>
        <div class="custom-service-list">
            <h3>已注册自定义服务</h3>
            <div id="custom-service-list" class="custom-service-empty">暂无自定义服务</div>
        </div>
    </div>

    <!-- 第三块：服务日志 -->
    <div class="card">
        <h2>服务日志</h2>
        <div class="btn-group" style="margin-bottom:10px; align-items:center;">
            <select id="log-process-select" onchange="loadLogs()" style="padding:6px 10px; background:#0f1629; border:1px solid #333; border-radius:4px; color:#e0e0e0; min-width:260px;">
                <option value="">最新受管进程 / 默认日志</option>
            </select>
            <button class="btn-secondary" onclick="loadLogs()">Refresh Logs</button>
        </div>
        <textarea id="log-area" class="log-area" readonly placeholder="暂无日志"></textarea>
    </div>

    <!-- 第四块：下载模型 -->
    <div class="card">
        <h2>下载模型</h2>
        <div class="form-grid">
            <label for="dl-repo">仓库</label>
            <input type="text" id="dl-repo" placeholder="tencent/Hy-MT2-7B-GGUF">
            <label for="dl-filename">文件名</label>
            <input type="text" id="dl-filename" placeholder="留空则全量下载整个仓库">
        </div>
        <div style="margin-top:10px; display:flex; align-items:center; gap:12px;">
            <button class="btn-success" id="btn-download" onclick="startDownload()">Download</button>
            <button class="btn-danger" id="btn-dl-cancel" onclick="cancelDownload()" disabled>Cancel</button>
            <span id="dl-status-badge" class="badge badge-stopped">Idle</span>
            <span id="dl-status-text" style="color:#888; font-size:0.85em;"></span>
        </div>
        <!-- 进度条 -->
        <div id="dl-progress-wrap" style="display:none; margin-top:10px;">
            <div style="background:#0a0a1a; border-radius:4px; overflow:hidden; height:20px; border:1px solid #333;">
                <div id="dl-progress-bar" style="height:100%; background:linear-gradient(90deg,#1565c0,#2e7d32); width:0%; transition:width 0.3s;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:0.8em; color:#888; margin-top:4px;">
                <span id="dl-progress-text">0%</span>
                <span id="dl-progress-size">0 MB / 0 MB</span>
            </div>
        </div>
        <!-- 强制重新下载 -->
        <div class="checkbox-row" style="margin-top:8px;">
            <input type="checkbox" id="dl-force">
            <label for="dl-force">强制重新下载（忽略本地缓存校验）</label>
        </div>
    </div>

    <!-- 第五块：下载日志 -->
    <div class="card">
        <h2>下载日志</h2>
        <div class="btn-group" style="margin-bottom:10px">
            <button class="btn-secondary" onclick="loadDownloadLogs()">Refresh Logs</button>
        </div>
        <textarea id="dl-log-area" class="log-area" readonly placeholder="暂无下载日志"></textarea>
    </div>

    <!-- 第六块：设置 -->
    <div class="card">
        <h2>设置</h2>
        <div class="form-grid">
            <label for="set-server-path">llama-server 路径</label>
            <input type="text" id="set-server-path" placeholder="/path/to/llama-server">
            <label for="set-model-dir">模型目录</label>
            <input type="text" id="set-model-dir" placeholder="/path/to/gguf">
            <label for="set-gpu-history-hours">GPU 历史小时数</label>
            <input type="number" id="set-gpu-history-hours" min="0.25" max="168" step="0.25" value="2">
        </div>
        <div class="btn-group" style="margin-top:12px">
            <button class="btn-primary" onclick="saveSettings()">Save Settings</button>
            <button class="btn-secondary" onclick="loadModels()">Rescan Models</button>
        </div>
    </div>
</div>

<script>
// ── 全局状态 ──────────────────────────────────────────
let currentSettings = {};
let currentGpuIndexes = [];
let customServices = [];
let managedProcessRecords = [];
let editingCustomServiceId = "";

// ── 工具函数 ──────────────────────────────────────────

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function clampPercent(value) {
    const n = Number(value) || 0;
    return Math.max(0, Math.min(100, n));
}

function formatMem(value) {
    if (value === null || value === undefined || value === "") return "-";
    const n = Number(value) || 0;
    if (n >= 1024) return `${(n / 1024).toFixed(1)} GB`;
    return `${n} MB`;
}

function formatClock(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
}

function showError(msg) {
    const bar = document.getElementById("error-bar");
    document.getElementById("error-text").textContent = msg;
    bar.style.display = "block";
    setTimeout(clearError, 5000);
}

function clearError() {
    document.getElementById("error-bar").style.display = "none";
}

async function api(method, path, body) {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const resp = await fetch(path, opts);
    const data = await resp.json();
    if (!resp.ok) {
        const msg = data.detail || data.error || JSON.stringify(data);
        showError(msg);
        throw new Error(msg);
    }
    return data;
}

// ── 设置 ──────────────────────────────────────────────

async function loadSettings() {
    currentSettings = await api("GET", "/api/settings");
    document.getElementById("set-server-path").value = currentSettings.llama_server_path || "";
    document.getElementById("set-model-dir").value = currentSettings.model_dir || "";
    document.getElementById("start-port").value = currentSettings.port || 8080;
    document.getElementById("start-auto-kill").checked = currentSettings.auto_kill_port !== false;
    document.getElementById("set-gpu-history-hours").value = currentSettings.gpu_history_hours || 2;
    return currentSettings;
}

let modelParams = {};

async function loadModelParams() {
    try {
        modelParams = await api("GET", "/api/model-params");
    } catch (e) {}
}

function onModelChange() {
    const model = document.getElementById("start-model").value;
    const extra = document.getElementById("start-extra");
    const isCustom = model.startsWith("custom:");
    document.getElementById("start-port-label").classList.toggle("hidden", isCustom);
    document.getElementById("start-port").classList.toggle("hidden", isCustom);
    document.getElementById("start-extra-label").classList.toggle("hidden", isCustom);
    extra.classList.toggle("hidden", isCustom);
    if (isCustom) {
        extra.value = "";
        extra.disabled = true;
        extra.placeholder = "自定义服务使用完整启动命令，不使用 Extra Args";
        return;
    }
    extra.disabled = false;
    extra.placeholder = "-c 4096 --n-gpu-layers 99 --threads 8";
    const params = modelParams[model];
    if (params) {
        document.getElementById("start-port").value = params.port || 8083;
        extra.value = params.extra_args || "";
    } else {
        // 未启动过的模型，恢复默认
        document.getElementById("start-port").value = currentSettings.port || 8083;
        extra.value = "";
    }
}

async function saveSettings() {
    const data = {
        llama_server_path: document.getElementById("set-server-path").value,
        model_dir: document.getElementById("set-model-dir").value,
        host: "0.0.0.0",
        port: parseInt(document.getElementById("start-port").value) || 8080,
        auto_kill_port: document.getElementById("start-auto-kill").checked,
        gpu_history_hours: parseFloat(document.getElementById("set-gpu-history-hours").value) || 2,
    };
    await api("POST", "/api/settings", data);
    loadGpuStatus();
    alert("设置已保存");
}

// ── 模型扫描 ──────────────────────────────────────────

async function loadModels() {
    const data = await api("GET", "/api/models");
    const serviceData = await api("GET", "/api/custom-services");
    customServices = serviceData.services || [];
    const select = document.getElementById("start-model");
    // 清空选项
    select.innerHTML = "";
    if (data.models.length === 0 && customServices.length === 0) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "-- 未找到模型或自定义服务 --";
        select.appendChild(opt);
    } else {
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "-- 选择模型 --";
        select.appendChild(placeholder);
        customServices.forEach(s => {
            const opt = document.createElement("option");
            opt.value = `custom:${s.id}`;
            opt.textContent = `${s.name} (:${s.port})`;
            select.appendChild(opt);
        });
        data.models.forEach(m => {
            const opt = document.createElement("option");
            opt.value = m.path;
            // 显示文件名 + 大小
            const sizeMB = (m.size / 1024 / 1024).toFixed(0);
            opt.textContent = `${m.name} (${sizeMB} MB)`;
            select.appendChild(opt);
        });
    }
    onModelChange();
    renderCustomServiceList();
}

function toggleCustomServiceForm(force) {
    const form = document.getElementById("custom-service-form");
    const show = force === undefined ? form.classList.contains("hidden") : force;
    form.classList.toggle("hidden", !show);
    if (!show) {
        resetCustomServiceForm();
    }
}

function resetCustomServiceForm() {
    editingCustomServiceId = "";
    document.getElementById("custom-service-id").value = "";
    document.getElementById("custom-service-name").value = "";
    document.getElementById("custom-service-command").value = "";
    document.getElementById("custom-service-save-btn").textContent = "保存自定义服务";
}

function renderCustomServiceList() {
    const wrap = document.getElementById("custom-service-list");
    if (!customServices.length) {
        wrap.className = "custom-service-empty";
        wrap.innerHTML = "暂无自定义服务";
        return;
    }
    wrap.className = "";
    wrap.innerHTML = customServices.map(service => `
        <div class="custom-service-row">
            <strong title="${escapeHtml(service.name || "")}">${escapeHtml(service.name || "Unknown")}</strong>
            <span>:${escapeHtml(service.port || "-")}</span>
            <code title="${escapeHtml(service.command || "")}">${escapeHtml(service.command || "")}</code>
            <div class="custom-service-actions">
                <button class="btn-secondary" onclick="editCustomService('${escapeHtml(service.id)}')">编辑</button>
                <button class="btn-danger" onclick="deleteCustomService('${escapeHtml(service.id)}')">删除</button>
            </div>
        </div>
    `).join("");
}

function editCustomService(serviceId) {
    const service = customServices.find(s => s.id === serviceId);
    if (!service) {
        showError("自定义服务不存在");
        return;
    }
    editingCustomServiceId = service.id;
    document.getElementById("custom-service-id").value = service.id;
    document.getElementById("custom-service-name").value = service.name || "";
    document.getElementById("custom-service-command").value = service.command || "";
    document.getElementById("custom-service-save-btn").textContent = "更新自定义服务";
    toggleCustomServiceForm(true);
}

async function saveCustomService() {
    const id = document.getElementById("custom-service-id").value || editingCustomServiceId;
    const name = document.getElementById("custom-service-name").value.trim();
    const command = document.getElementById("custom-service-command").value.trim();
    if (!command) {
        showError("请输入启动命令");
        return;
    }
    try {
        const payload = { name, command };
        if (id) payload.id = id;
        await api("POST", "/api/custom-services", payload);
        toggleCustomServiceForm(false);
        await loadModels();
    } catch (e) {}
}

async function deleteCustomService(serviceId) {
    const service = customServices.find(s => s.id === serviceId);
    const label = service ? service.name : serviceId;
    if (!confirm(`删除自定义服务 ${label}？`)) {
        return;
    }
    try {
        await api("DELETE", `/api/custom-services/${encodeURIComponent(serviceId)}`);
        if (editingCustomServiceId === serviceId) {
            resetCustomServiceForm();
            toggleCustomServiceForm(false);
        }
        await loadModels();
    } catch (e) {}
}

// ── GPU 监控 ──────────────────────────────────────────

function initGpuCardsPerRow() {
    const saved = localStorage.getItem("gpu_cards_per_row") || "auto";
    const select = document.getElementById("gpu-cards-per-row");
    select.value = ["auto", "2", "3", "4"].includes(saved) ? saved : "auto";
    applyGpuGridColumns(select.value);
}

function setGpuCardsPerRow() {
    const value = document.getElementById("gpu-cards-per-row").value;
    localStorage.setItem("gpu_cards_per_row", value);
    applyGpuGridColumns(value);
}

function applyGpuGridColumns(value) {
    const grid = document.getElementById("gpu-grid");
    const waveGrid = document.getElementById("gpu-wave-grid");
    grid.className = "gpu-grid";
    waveGrid.className = "gpu-wave-grid";
    if (["2", "3", "4"].includes(value)) {
        grid.classList.add(`cols-${value}`);
        waveGrid.classList.add(`cols-${value}`);
    }
}

async function loadGpuStatus() {
    try {
        const data = await api("GET", "/api/gpus");
        updateGpuUI(data);
    } catch (e) {
        updateGpuUI({ ok: false, error: e.message, gpus: [] });
    }
}

function updateGpuUI(data) {
    const errorBox = document.getElementById("gpu-error");
    const waveGrid = document.getElementById("gpu-wave-grid");
    const grid = document.getElementById("gpu-grid");
    const tbody = document.getElementById("gpu-process-body");
    const gpus = Array.isArray(data.gpus) ? data.gpus : [];
    const managedProcesses = Array.isArray(data.managed_processes) ? data.managed_processes : [];
    const historyHours = Number(data.history_hours || currentSettings.gpu_history_hours || 2);

    currentGpuIndexes = gpus.map(gpu => Number(gpu.index));
    if (managedProcesses.length) {
        managedProcessRecords = managedProcesses;
        updateLogProcessSelect();
    }
    updateStartGpuList(gpus);

    if (data.error) {
        errorBox.textContent = data.stale ? `当前 GPU 状态不可用，正在显示本地历史波形: ${data.error}` : data.error;
        errorBox.style.display = "block";
    } else {
        errorBox.textContent = "";
        errorBox.style.display = "none";
    }

    if (gpus.length === 0) {
        waveGrid.innerHTML = `<div class="gpu-empty">${data.ok === false ? "暂无可用 GPU 波形数据" : "未检测到 GPU"}</div>`;
        grid.innerHTML = `<div class="gpu-empty">${data.ok === false ? "暂无可用 GPU 数据" : "未检测到 GPU"}</div>`;
    } else {
        waveGrid.innerHTML = gpus.map(gpu => `
            <div class="gpu-wave-card">
                <div class="gpu-wave-title">
                    <strong>GPU ${escapeHtml(gpu.index)}</strong>
                    <span title="${escapeHtml(gpu.name)}">${escapeHtml(gpu.name || "Unknown")}</span>
                </div>
                <canvas class="gpu-wave-canvas" data-gpu-index="${escapeHtml(gpu.index)}"></canvas>
            </div>
        `).join("");
        drawGpuWaveforms(gpus, historyHours);

        grid.innerHTML = gpus.map(gpu => {
            const util = clampPercent(gpu.gpu_util);
            const hasMem = gpu.used_mem !== null && gpu.used_mem !== undefined && gpu.total_mem !== null && gpu.total_mem !== undefined;
            const memText = hasMem ? `${formatMem(gpu.used_mem)} / ${formatMem(gpu.total_mem)}` : "-";
            const users = Array.isArray(gpu.users) && gpu.users.length > 0 ? gpu.users.join(", ") : "None";
            return `
                <div class="gpu-card">
                    <div class="gpu-card-title">
                        <strong>GPU ${escapeHtml(gpu.index)}${gpu.stale ? " · History" : ""}</strong>
                        <span title="${escapeHtml(gpu.name)}">${escapeHtml(gpu.name || "Unknown")}</span>
                    </div>
                    <div class="gpu-metrics">
                        <div class="gpu-metric"><label>Util</label><span>${util}%</span></div>
                        <div class="gpu-metric"><label>Memory</label><span title="${escapeHtml(memText)}">${escapeHtml(memText)}</span></div>
                        <div class="gpu-metric"><label>Temp</label><span>${gpu.temperature === null || gpu.temperature === undefined ? "-" : escapeHtml(gpu.temperature) + " °C"}</span></div>
                        <div class="gpu-metric"><label>Processes</label><span>${escapeHtml(gpu.process_count ?? 0)}</span></div>
                        <div class="gpu-metric"><label>Users</label><span title="${escapeHtml(users)}">${escapeHtml(users)}</span></div>
                        <div class="gpu-metric"><label>Driver</label><span title="${escapeHtml(gpu.driver_version)}">${escapeHtml(gpu.driver_version || "-")}</span></div>
                    </div>
                    <div class="gpu-util-bar" title="GPU Util ${util}%">
                        <div class="gpu-util-fill" style="width:${util}%"></div>
                    </div>
                </div>
            `;
        }).join("");
    }

    if (managedProcesses.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" class="gpu-empty">暂无受管进程</td></tr>`;
        return;
    }

    tbody.innerHTML = managedProcesses.map(proc => `
        <tr>
            <td>${escapeHtml(proc.gpu ?? "-")}</td>
            <td title="${escapeHtml(proc.gpu_name || "")}">${escapeHtml(proc.gpu_name || "-")}</td>
            <td>${proc.gpu_util === null || proc.gpu_util === undefined ? "-" : clampPercent(proc.gpu_util) + "%"}</td>
            <td>${escapeHtml(proc.pid ?? "-")}</td>
            <td>${escapeHtml(formatMem(proc.used_mem))}</td>
            <td>${escapeHtml(formatMem(proc.total_mem))}</td>
            <td>${proc.temperature === null || proc.temperature === undefined ? "-" : escapeHtml(proc.temperature) + " °C"}</td>
            <td title="${escapeHtml(proc.command || "")}">${escapeHtml(proc.model_name || "Unknown")}</td>
            <td>
                <button class="btn-primary" onclick="openManagedWebUI(${Number(proc.pid)})">Open</button>
                <button class="btn-danger" onclick="stopManagedProcess(${Number(proc.pid)})">Stop</button>
                <button class="btn-warning" onclick="restartManagedProcess(${Number(proc.pid)})">Restart</button>
            </td>
        </tr>
    `).join("");
}

function updateStartGpuList(gpus) {
    const wrap = document.getElementById("start-gpu-list");
    const checked = new Set(
        Array.from(wrap.querySelectorAll("input[type='checkbox']:checked")).map(input => input.value)
    );
    if (!gpus.length) {
        wrap.innerHTML = `<span style="color:#888;">未检测到 GPU，不设置 CUDA_VISIBLE_DEVICES</span>`;
        return;
    }
    wrap.innerHTML = gpus.map(gpu => {
        const value = String(gpu.index);
        const isChecked = checked.has(value) ? "checked" : "";
        return `
            <label class="checkbox-row" style="margin-top:0;">
                <input type="checkbox" class="start-gpu" value="${escapeHtml(value)}" ${isChecked}>
                <span>GPU ${escapeHtml(gpu.index)}</span>
            </label>
        `;
    }).join("");
}

function selectedGpuIndexes() {
    return Array.from(document.querySelectorAll(".start-gpu:checked"))
        .map(input => parseInt(input.value))
        .filter(n => Number.isInteger(n) && n >= 0);
}

function drawGpuWaveforms(gpus, historyHours) {
    const now = Date.now() / 1000;
    const startTs = now - historyHours * 3600;
    gpus.forEach(gpu => {
        const canvas = document.querySelector(`canvas[data-gpu-index="${gpu.index}"]`);
        if (!canvas) return;
        drawGpuWaveform(canvas, gpu, startTs, now);
    });
}

function drawGpuWaveform(canvas, gpu, startTs, endTs) {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const width = Math.max(1, Math.floor(rect.width * dpr));
    const height = Math.max(1, Math.floor(rect.height * dpr));
    if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
    }

    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = "#10161d";
    ctx.fillRect(0, 0, width, height);

    const left = 44 * dpr;
    const right = 10 * dpr;
    const top = 10 * dpr;
    const bottom = 26 * dpr;
    const plotW = width - left - right;
    const plotH = height - top - bottom;

    ctx.font = `${11 * dpr}px SF Mono, Consolas, monospace`;
    ctx.textBaseline = "middle";
    ctx.strokeStyle = "#263247";
    ctx.fillStyle = "#8fa1bd";
    ctx.lineWidth = 1 * dpr;

    [0, 50, 100].forEach(value => {
        const y = top + plotH - (value / 100) * plotH;
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.lineTo(width - right, y);
        ctx.stroke();
        ctx.fillText(String(value), 8 * dpr, y);
    });

    ctx.textBaseline = "top";
    ctx.fillText(formatClock(startTs), left, height - bottom + 7 * dpr);
    const endText = formatClock(endTs);
    const endWidth = ctx.measureText(endText).width;
    ctx.fillText(endText, width - right - endWidth, height - bottom + 7 * dpr);

    const history = Array.isArray(gpu.history) ? gpu.history : [];
    const points = history
        .filter(p => p.timestamp >= startTs && p.timestamp <= endTs)
        .map(p => ({
            x: left + ((p.timestamp - startTs) / (endTs - startTs)) * plotW,
            y: top + plotH - (clampPercent(p.gpu_util) / 100) * plotH,
        }));

    if (points.length === 0) {
        ctx.fillStyle = "#6f7d92";
        ctx.textAlign = "center";
        ctx.fillText("等待采样", left + plotW / 2, top + plotH / 2);
        ctx.textAlign = "left";
        return;
    }

    ctx.strokeStyle = "#52d273";
    ctx.lineWidth = 2 * dpr;
    ctx.beginPath();
    points.forEach((point, i) => {
        if (i === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
    });
    ctx.stroke();

    const last = points[points.length - 1];
    ctx.fillStyle = "#6be675";
    ctx.beginPath();
    ctx.arc(last.x, last.y, 3 * dpr, 0, Math.PI * 2);
    ctx.fill();
}

// ── 启动 / 停止 / 重启 ───────────────────────────────

async function startServer() {
    const model = document.getElementById("start-model").value;
    if (!model) {
        showError("请选择要启动的模型或自定义服务");
        return;
    }
    const isCustom = model.startsWith("custom:");
    const startBtn = document.getElementById("btn-start");
    const feedback = document.getElementById("start-feedback");
    const originalText = startBtn.textContent;
    const body = {
        model,
        host: "0.0.0.0",
        auto_kill_port: document.getElementById("start-auto-kill").checked,
        incremental_start: document.getElementById("start-incremental").checked,
        gpu_indexes: selectedGpuIndexes(),
    };
    if (!isCustom) {
        body.port = parseInt(document.getElementById("start-port").value) || 8080;
        body.extra_args = document.getElementById("start-extra").value;
    }

    try {
        startBtn.disabled = true;
        startBtn.textContent = "Starting...";
        feedback.style.display = "block";
        feedback.textContent = isCustom ? "自定义服务启动中，vLLM 加载模型可能需要几十秒..." : "服务启动中...";
        const result = await api("POST", "/api/start", body);
        feedback.innerHTML = `<strong>已提交启动</strong> PID ${escapeHtml(result.pid)} · Port ${escapeHtml(result.port || "-")}。如服务仍在加载，请查看下方服务日志。`;
        await loadGpuStatus();
        await loadManagedProcesses();
        const logSelect = document.getElementById("log-process-select");
        if (result.pid) {
            logSelect.value = String(result.pid);
        }
        await loadLogs();
    } catch (e) {
        feedback.style.display = "block";
        feedback.textContent = "启动失败，请查看顶部错误提示。";
    } finally {
        startBtn.disabled = false;
        startBtn.textContent = originalText;
    }
}

async function stopServer() {
    try {
        await api("POST", "/api/stop");
        document.getElementById("log-area").value = "";
        loadGpuStatus();
        loadManagedProcesses();
    } catch (e) {}
}

async function restartServer() {
    try {
        await api("POST", "/api/restart");
        loadGpuStatus();
        loadManagedProcesses();
        loadLogs();
    } catch (e) {}
}

function openWebUI() {
    window.open("/llama/", "_blank");
}

function openManagedWebUI(pid) {
    window.open(`/llama-process/${pid}/`, "_blank");
}

async function stopManagedProcess(pid) {
    try {
        await api("POST", "/api/stop", { pid });
        loadGpuStatus();
        loadManagedProcesses();
        loadLogs();
    } catch (e) {}
}

async function restartManagedProcess(pid) {
    try {
        await api("POST", "/api/restart", { pid });
        loadGpuStatus();
        loadManagedProcesses();
        loadLogs();
    } catch (e) {}
}

// ── 日志 ──────────────────────────────────────────────

async function loadManagedProcesses() {
    try {
        const data = await api("GET", "/api/managed-processes");
        managedProcessRecords = data.processes || [];
        updateLogProcessSelect();
    } catch (e) {}
}

function updateLogProcessSelect() {
    const select = document.getElementById("log-process-select");
    const current = select.value;
    select.innerHTML = "";
    const defaultOpt = document.createElement("option");
    defaultOpt.value = "";
    defaultOpt.textContent = "最新受管进程 / 默认日志";
    select.appendChild(defaultOpt);
    managedProcessRecords.forEach(proc => {
        const opt = document.createElement("option");
        opt.value = String(proc.pid);
        const state = proc.running ? "Running" : "Stopped";
        const type = (proc.service_type || proc.service_kind || "llama").toUpperCase();
        opt.textContent = `PID ${proc.pid} · ${type} · ${proc.display_name || proc.model_name || "Unknown"} · :${proc.port} · ${state}`;
        select.appendChild(opt);
    });
    if (Array.from(select.options).some(opt => opt.value === current)) {
        select.value = current;
    }
}

async function loadLogs() {
    try {
        await loadManagedProcesses();
        const pid = document.getElementById("log-process-select").value;
        const path = pid ? `/api/logs?pid=${encodeURIComponent(pid)}` : "/api/logs";
        const data = await api("GET", path);
        document.getElementById("log-area").value = data.logs || "";
    } catch (e) {}
}

// ── 下载 ──────────────────────────────────────────────

async function startDownload() {
    const repo = document.getElementById("dl-repo").value.trim();
    const filename = document.getElementById("dl-filename").value.trim();
    const force_download = document.getElementById("dl-force").checked;
    if (!repo) {
        showError("请输入仓库名");
        return;
    }
    try {
        await api("POST", "/api/download", { repo, filename, force_download });
        updateDownloadUI({ running: true, done: false, repo, filename, progress: null });
    } catch (e) {}
}

async function cancelDownload() {
    try {
        await api("POST", "/api/download/cancel");
        updateDownloadUI({ running: false, done: false });
    } catch (e) {}
}

async function loadDownloadStatus() {
    try {
        const data = await api("GET", "/api/download/status");
        updateDownloadUI(data);
        // 下载刚完成时自动刷新模型列表
        if (data.done && !data.running) {
            loadModels();
        }
    } catch (e) {}
}

function downloadLabel(data) {
    const lbl = data.filename ? `${data.repo || ""} / ${data.filename}` : `${data.repo || ""} 全量`;
    return data.target_dir ? `${lbl} → ${data.target_dir}` : lbl;
}

function updateDownloadUI(data) {
    const badge = document.getElementById("dl-status-badge");
    const text = document.getElementById("dl-status-text");
    const btnDl = document.getElementById("btn-download");
    const btnCancel = document.getElementById("btn-dl-cancel");
    const progressWrap = document.getElementById("dl-progress-wrap");
    const progressBar = document.getElementById("dl-progress-bar");
    const progressText = document.getElementById("dl-progress-text");
    const progressSize = document.getElementById("dl-progress-size");

    if (data.running) {
        badge.textContent = "Downloading";
        badge.className = "badge badge-running";
        text.textContent = downloadLabel(data);
        btnDl.disabled = true;
        btnCancel.disabled = false;
        // 更新进度条
        if (data.progress && data.progress.total > 0) {
            progressWrap.style.display = "block";
            progressBar.style.width = data.progress.percentage + "%";
            progressText.textContent = data.progress.percentage + "%";
            progressSize.textContent = `${data.progress.downloaded_mb} MB / ${data.progress.total_mb} MB`;
        } else {
            progressWrap.style.display = "block";
            progressBar.style.width = "0%";
            progressText.textContent = "准备中...";
            progressSize.textContent = "";
        }
    } else if (data.done) {
        badge.textContent = "Done";
        badge.className = "badge badge-running";
        text.textContent = downloadLabel(data);
        btnDl.disabled = false;
        btnCancel.disabled = true;
        // 完成时显示100%
        if (data.progress && data.progress.total > 0) {
            progressWrap.style.display = "block";
            progressBar.style.width = "100%";
            progressText.textContent = "100%";
            progressSize.textContent = `${data.progress.total_mb} MB`;
        } else {
            progressWrap.style.display = "none";
        }
    } else {
        badge.textContent = "Idle";
        badge.className = "badge badge-stopped";
        text.textContent = "";
        btnDl.disabled = false;
        btnCancel.disabled = true;
        progressWrap.style.display = "none";
    }
}

// ── 下载日志 ──────────────────────────────────────────

async function loadDownloadLogs() {
    try {
        const data = await api("GET", "/api/download/logs");
        document.getElementById("dl-log-area").value = data.logs || "";
    } catch (e) {}
}

// ── 初始化 ────────────────────────────────────────────

document.addEventListener("DOMContentLoaded", () => {
    initGpuCardsPerRow();
    loadSettings().then(() => loadModelParams()).then(() => loadModels());
    loadGpuStatus();
    loadManagedProcesses();
    loadLogs();
    loadDownloadLogs();

    // 自动刷新
    setInterval(loadGpuStatus, 5000);
    setInterval(loadLogs, 5000);
    setInterval(loadDownloadStatus, 3000);
    setInterval(loadDownloadLogs, 5000);
    loadDownloadStatus();
});
</script>
