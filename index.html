<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaManager</title>
    <link rel="icon" href="/icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            padding: 20px 0;
            font-size: 1.8em;
            color: #fff;
            border-bottom: 2px solid #333;
            margin-bottom: 20px;
        }

        .card {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 1.1em;
            color: #aaa;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 错误横幅 */
        #error-bar {
            display: none;
            background: #c62828;
            color: white;
            padding: 10px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        #error-bar button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2em;
            margin-left: 10px;
            cursor: pointer;
        }

        /* 状态徽章 */
        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .badge-running { background: #2e7d32; color: #fff; }
        .badge-stopped { background: #555; color: #ccc; }
        .badge-danger { background: #c62828; color: #fff; }
        .badge-warning { background: #e65100; color: #fff; }

        /* 状态信息行 */
        .status-info {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 4px 12px;
            margin: 10px 0;
            font-size: 0.95em;
        }
        .status-info dt { color: #888; }
        .status-info dd {
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            color: #e0e0e0;
            word-break: break-all;
        }

        /* 按钮组 */
        .btn-group { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

        /* 按钮 */
        button, .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary { background: #1565c0; color: #fff; }
        .btn-danger { background: #c62828; color: #fff; }
        .btn-success { background: #2e7d32; color: #fff; }
        .btn-secondary { background: #444; color: #ccc; }
        .btn-warning { background: #e65100; color: #fff; }

        /* 表单 */
        .form-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 8px 12px;
            align-items: center;
        }
        .form-grid label {
            color: #aaa;
            font-size: 0.9em;
            text-align: right;
        }
        .form-grid input,
        .form-grid select,
        .form-grid textarea {
            width: 100%;
            padding: 6px 10px;
            background: #0f1629;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 0.9em;
        }
        .form-grid input:focus,
        .form-grid select:focus,
        .form-grid textarea:focus {
            outline: none;
            border-color: #1565c0;
        }
        .form-grid select option {
            background: #0f1629;
            color: #e0e0e0;
        }

        .full-width { grid-column: 1 / -1; }
        .hidden { display: none; }

        .custom-service-list {
            margin-top: 12px;
            border-top: 1px solid #2f3b52;
            padding-top: 12px;
        }
        .custom-service-list h3 {
            font-size: 0.95em;
            color: #aaa;
            margin-bottom: 8px;
        }
        .custom-service-row {
            display: grid;
            grid-template-columns: minmax(120px, 0.9fr) 70px minmax(220px, 2fr) auto;
            gap: 8px;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #263247;
            font-size: 0.88em;
        }
        .custom-service-row:last-child {
            border-bottom: none;
        }
        .custom-service-row code {
            color: #b7c7df;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }
        .custom-service-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .custom-service-empty {
            color: #7d8ba3;
            font-size: 0.88em;
        }
        .download-task-list {
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
        }
        .download-task-row {
            display: grid;
            grid-template-columns: minmax(180px, 1.2fr) minmax(160px, 1fr) 120px auto;
            gap: 10px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #263247;
            font-size: 0.88em;
        }
        .download-task-row:last-child {
            border-bottom: none;
        }
        .download-task-title {
            min-width: 0;
        }
        .download-task-title strong,
        .download-task-title span {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .download-task-title span {
            color: #7d8ba3;
            font-size: 0.9em;
        }
        .download-progress {
            min-width: 0;
        }
        .download-progress-track {
            background: #0a0a1a;
            border: 1px solid #333;
            border-radius: 4px;
            height: 16px;
            overflow: hidden;
        }
        .download-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1565c0, #2e7d32);
            width: 0%;
            transition: width 0.3s;
        }
        .download-progress-meta {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            color: #888;
            font-size: 0.82em;
            margin-top: 4px;
        }
        .download-task-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .start-feedback {
            display: none;
            margin-top: 10px;
            padding: 8px 10px;
            border: 1px solid #2f3b52;
            border-radius: 4px;
            background: #101b32;
            color: #b7c7df;
            font-size: 0.9em;
        }
        .start-feedback strong {
            color: #e5eefc;
        }
        .settings-detect-status {
            display: none;
            color: #b7c7df;
            font-size: 0.88em;
            margin-top: 8px;
            word-break: break-all;
        }
        .settings-detect-status.error {
            color: #ffb3b3;
        }

        /* 日志区域 */
        .log-area {
            width: 100%;
            min-height: 180px;
            max-height: 600px;
            height: 320px;
            background: #0a0a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #b0b0b0;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.85em;
            padding: 10px;
            resize: vertical;
            overflow-y: auto;
        }

        /* checkbox */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #1565c0;
        }
        .checkbox-row label {
            color: #aaa;
            font-size: 0.9em;
        }

        /* GPU 监控 */
        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .card-header-row h2 {
            margin-bottom: 0;
        }
        .compact-control {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            font-size: 0.9em;
        }
        .compact-control select {
            padding: 5px 8px;
            background: #0f1629;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
        }
        .gpu-error {
            display: none;
            margin-bottom: 10px;
            padding: 8px 10px;
            border: 1px solid #6d3d16;
            border-radius: 4px;
            background: #2d2118;
            color: #ffb066;
            font-size: 0.9em;
        }
        .gpu-wave-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }
        .gpu-wave-grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .gpu-wave-grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .gpu-wave-grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .gpu-wave-card {
            background: #0f1629;
            border: 1px solid #2f3b52;
            border-radius: 6px;
            padding: 10px;
            min-width: 0;
        }
        .gpu-wave-title {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            color: #dbe6f3;
            font-size: 0.9em;
            margin-bottom: 6px;
        }
        .gpu-wave-title span {
            color: #8fa1bd;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .gpu-wave-canvas {
            width: 100%;
            height: 150px;
            display: block;
            background: #10161d;
            border: 1px solid #263247;
            border-radius: 4px;
        }
        .gpu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }
        .gpu-grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .gpu-grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .gpu-grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .gpu-card {
            background: #0f1629;
            border: 1px solid #2f3b52;
            border-radius: 6px;
            padding: 12px;
            min-width: 0;
        }
        .gpu-card-title {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .gpu-card-title strong {
            color: #fff;
            font-size: 1em;
        }
        .gpu-card-title span {
            color: #8fa1bd;
            font-size: 0.82em;
            word-break: break-word;
            text-align: right;
        }
        .gpu-metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }
        .gpu-metric {
            background: #0a0f1f;
            border: 1px solid #263247;
            border-radius: 4px;
            padding: 7px 8px;
            min-width: 0;
        }
        .gpu-metric label {
            display: block;
            color: #7e8da6;
            font-size: 0.75em;
            line-height: 1.2;
        }
        .gpu-metric span {
            display: block;
            color: #e8edf5;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.95em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .gpu-util-bar {
            height: 12px;
            background: #07100c;
            border: 1px solid #1d3f2b;
            border-radius: 3px;
            overflow: hidden;
        }
        .gpu-util-fill {
            height: 100%;
            background: linear-gradient(90deg, #1b8f4a, #6be675);
            width: 0%;
            transition: width 0.25s;
        }
        .gpu-empty {
            color: #888;
            padding: 14px 0;
            text-align: center;
        }
        .table-wrap {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #2f3b52;
            border-radius: 6px;
            background: #0f1629;
        }
        .gpu-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 820px;
            font-size: 0.88em;
        }
        .gpu-table th,
        .gpu-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #263247;
            text-align: left;
            white-space: nowrap;
        }
        .gpu-table th {
            background: #101b32;
            color: #8fa1bd;
            font-weight: 600;
        }
        .gpu-table td {
            color: #dde5ef;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        }
        .gpu-table tr:last-child td {
            border-bottom: none;
        }

        @media (max-width: 760px) {
            .container { padding: 12px; }
            .custom-service-row {
                grid-template-columns: 1fr;
                align-items: start;
            }
            .download-task-row {
                grid-template-columns: 1fr;
                align-items: start;
            }
            .custom-service-actions {
                justify-content: flex-start;
            }
            .download-task-actions {
                justify-content: flex-start;
            }
            .gpu-wave-grid,
            .gpu-wave-grid.cols-2,
            .gpu-wave-grid.cols-3,
            .gpu-wave-grid.cols-4,
            .gpu-grid,
            .gpu-grid.cols-2,
            .gpu-grid.cols-3,
            .gpu-grid.cols-4 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- 错误横幅 -->
<div id="error-bar">
    <span id="error-text"></span>
    <button onclick="clearError()">&times;</button>
</div>

<div class="container">
    <h1><img src="/icon.png" alt="LlamaManager" style="height:32px;vertical-align:middle;"> LlamaManager</h1>

    <!-- GPU 监控 -->
    <div class="card">
        <div class="card-header-row">
            <h2>GPU 监控</h2>
            <label class="compact-control" for="gpu-cards-per-row">
                Cards per row
                <select id="gpu-cards-per-row" onchange="setGpuCardsPerRow()">
                    <option value="auto">Auto</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </label>
        </div>
        <div id="gpu-error" class="gpu-error"></div>
        <div id="gpu-wave-grid" class="gpu-wave-grid">
            <div class="gpu-empty">正在加载 GPU 波形...</div>
        </div>
        <div id="gpu-grid" class="gpu-grid">
            <div class="gpu-empty">正在加载 GPU 状态...</div>
        </div>
        <div class="table-wrap">
            <table class="gpu-table">
                <thead>
                    <tr>
                        <th>GPU</th>
                        <th>GPU Name</th>
                        <th>GPU Util</th>
                        <th>PID</th>
                        <th>Used Mem</th>
                        <th>Total Mem</th>
                        <th>Temp</th>
                        <th>Model Name</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="gpu-process-body">
                    <tr><td colspan="9" class="gpu-empty">暂无受管进程</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 第二块：服务管理（注册 + 启动） -->
    <div class="card">
        <h2>服务管理</h2>

        <!-- 注册表单：llama.cpp / vLLM 类型切换 -->
        <div class="form-grid">
            <label>服务类型</label>
            <div style="display:flex; gap:24px; align-items:center;">
                <label style="display:flex; gap:6px; align-items:center; color:#e0e0e0; text-align:left; margin:0;"><input type="radio" name="svc-type" value="llama" checked onchange="onServiceTypeChange()"> llama.cpp</label>
                <label style="display:flex; gap:6px; align-items:center; color:#e0e0e0; text-align:left; margin:0;"><input type="radio" name="svc-type" value="vllm" onchange="onServiceTypeChange()"> vLLM</label>
            </div>

            <input type="hidden" id="custom-service-id">

            <label for="custom-service-name">服务名</label>
            <input type="text" id="custom-service-name" placeholder="留空则自动用模型/命令推断">

            <!-- llama.cpp 字段 -->
            <label for="svc-llama-model" class="svc-llama-field">模型</label>
            <select id="svc-llama-model" class="svc-llama-field">
                <option value="">-- 请先扫描模型 --</option>
            </select>

            <label for="svc-llama-port" class="svc-llama-field">端口</label>
            <input type="number" id="svc-llama-port" class="svc-llama-field" value="8083">

            <label for="svc-llama-extra" class="svc-llama-field">Extra Args</label>
            <input type="text" id="svc-llama-extra" class="svc-llama-field" placeholder="-c 4096 --n-gpu-layers 99 --threads 8">

            <label class="svc-llama-field">选择 GPU</label>
            <div id="start-gpu-list" class="svc-llama-field" style="display:flex; gap:10px; flex-wrap:wrap; color:#aaa; font-size:0.9em;">
                <span style="color:#888;">自动使用全部可见 GPU</span>
            </div>

            <!-- vLLM 字段（默认隐藏，切到 vLLM 时显示） -->
            <label for="vllm-repo" class="svc-vllm-field" style="display:none;">仓库模型</label>
            <select id="vllm-repo" class="svc-vllm-field" style="display:none;" onchange="onVllmRepositoryChange()">
                <option value="">-- 请先扫描仓库模型 --</option>
            </select>
            <div id="vllm-repo-path" class="full-width svc-vllm-field custom-service-empty" style="display:none;">暂无可用仓库模型</div>

            <label for="custom-service-command" class="svc-vllm-field" style="display:none;">启动命令</label>
            <textarea id="custom-service-command" class="svc-vllm-field" rows="3" style="display:none;" placeholder="python -m vllm.entrypoints.openai.api_server --model /path/to/repo --host 0.0.0.0 --port 8085"></textarea>

            <div class="full-width btn-group">
                <button class="btn-primary" id="custom-service-save-btn" onclick="saveService()">保存服务</button>
                <button class="btn-secondary" onclick="resetServiceForm()">清空</button>
                <button class="btn-secondary" onclick="loadModels()">扫描模型</button>
                <button class="btn-secondary" onclick="loadVllmRepositories()">扫描仓库</button>
            </div>
        </div>

        <!-- 已注册服务（注册列表：增删改） -->
        <div class="custom-service-list">
            <h3>已注册服务</h3>
            <div id="registered-service-list" class="custom-service-empty">暂无已注册服务</div>
        </div>

        <!-- 启动行为全局开关 -->
        <div class="custom-service-list">
            <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:center;">
                <label style="display:flex; gap:6px; align-items:center; color:#e0e0e0; margin:0;"><input type="checkbox" id="start-auto-kill" checked> 端口被占用时自动 kill</label>
                <label style="display:flex; gap:6px; align-items:center; color:#e0e0e0; margin:0;"><input type="checkbox" id="start-incremental" checked> 增量启动（不停止已有实例）</label>
            </div>
        </div>

        <!-- 启动 / 运行中（启动列表：启停） -->
        <div class="custom-service-list">
            <h3>启动 / 运行中</h3>
            <div id="launch-service-list" class="custom-service-empty">暂无已注册服务</div>
        </div>
        <div id="start-feedback" class="start-feedback"></div>
    </div>

    <!-- 第四块：服务日志 -->
    <div class="card">
        <h2>服务日志</h2>
        <div class="btn-group" style="margin-bottom:10px; align-items:center;">
            <select id="log-process-select" onchange="loadLogs()" style="padding:6px 10px; background:#0f1629; border:1px solid #333; border-radius:4px; color:#e0e0e0; min-width:260px;">
                <option value="">最新受管进程 / 默认日志</option>
            </select>
            <button class="btn-secondary" onclick="loadLogs()">Refresh Logs</button>
        </div>
        <textarea id="log-area" class="log-area" readonly placeholder="暂无日志"></textarea>
    </div>

    <!-- 第五块：下载模型 -->
    <div class="card">
        <h2>下载模型</h2>
        <div class="form-grid">
            <label for="dl-repo">仓库</label>
            <input type="text" id="dl-repo" placeholder="tencent/Hy-MT2-7B-GGUF">
            <label for="dl-filename">文件名</label>
            <input type="text" id="dl-filename" placeholder="留空则全量下载整个仓库">
        </div>
        <div style="margin-top:10px; display:flex; align-items:center; gap:12px;">
            <button class="btn-success" id="btn-download" onclick="startDownload()">Download</button>
            <span id="dl-status-text" style="color:#888; font-size:0.85em;"></span>
        </div>
        <!-- 强制重新下载 -->
        <div class="checkbox-row" style="margin-top:8px;">
            <input type="checkbox" id="dl-force">
            <label for="dl-force">强制重新下载（忽略本地缓存校验）</label>
        </div>
    </div>

    <!-- 第六块：下载日志 -->
    <div class="card">
        <h2>下载任务</h2>
        <div id="download-task-list" class="download-task-list">
            <div class="custom-service-empty">暂无下载任务</div>
        </div>
        <div class="btn-group" style="margin-bottom:10px; align-items:center;">
            <select id="download-log-select" onchange="loadDownloadLogs()" style="padding:6px 10px; background:#0f1629; border:1px solid #333; border-radius:4px; color:#e0e0e0; min-width:260px;">
                <option value="">最新下载任务</option>
            </select>
            <button class="btn-secondary" onclick="loadDownloadLogs()">Refresh Logs</button>
        </div>
        <textarea id="dl-log-area" class="log-area" readonly placeholder="暂无下载日志"></textarea>
    </div>

    <!-- 第七块：设置 -->
    <div class="card">
        <h2>设置</h2>
        <div class="form-grid">
            <label for="set-server-path">llama-server 路径</label>
            <input type="text" id="set-server-path" placeholder="/path/to/llama-server">
            <label for="set-model-dir">模型目录</label>
            <input type="text" id="set-model-dir" placeholder="/path/to/gguf">
            <label for="set-gpu-history-hours">GPU 历史小时数</label>
            <input type="number" id="set-gpu-history-hours" min="0.25" max="168" step="0.25" value="2">
            <label for="set-port">默认端口</label>
            <input type="number" id="set-port" value="8080">
        </div>
        <div class="btn-group" style="margin-top:12px">
            <button class="btn-primary" onclick="saveSettings()">Save Settings</button>
            <button class="btn-secondary" id="detect-llama-cpp-btn" onclick="detectLlamaCpp()">检测 llama.cpp</button>
            <button class="btn-secondary" onclick="loadModels()">Rescan Models</button>
        </div>
        <div id="detect-llama-cpp-status" class="settings-detect-status"></div>
    </div>
</div>

<script>
// ── 全局状态 ──────────────────────────────────────────
let currentSettings = {};
let currentGpuIndexes = [];
let customServices = [];
let modelRepositories = [];
let managedProcessRecords = [];
let downloadTasks = [];
let completedDownloadTaskIds = new Set();
let editingCustomServiceId = "";

// ── 工具函数 ──────────────────────────────────────────

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function clampPercent(value) {
    const n = Number(value) || 0;
    return Math.max(0, Math.min(100, n));
}

function formatMem(value) {
    if (value === null || value === undefined || value === "") return "-";
    const n = Number(value) || 0;
    if (n >= 1024) return `${(n / 1024).toFixed(1)} GB`;
    return `${n} MB`;
}

function formatClock(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
}

function showError(msg) {
    const bar = document.getElementById("error-bar");
    document.getElementById("error-text").textContent = msg;
    bar.style.display = "block";
    setTimeout(clearError, 5000);
}

function clearError() {
    document.getElementById("error-bar").style.display = "none";
}

async function api(method, path, body) {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const resp = await fetch(path, opts);
    const data = await resp.json();
    if (!resp.ok) {
        const msg = data.detail || data.error || JSON.stringify(data);
        showError(msg);
        throw new Error(msg);
    }
    return data;
}

// ── 设置 ──────────────────────────────────────────────

async function loadSettings() {
    currentSettings = await api("GET", "/api/settings");
    document.getElementById("set-server-path").value = currentSettings.llama_server_path || "";
    document.getElementById("set-model-dir").value = currentSettings.model_dir || "";
    document.getElementById("set-port").value = currentSettings.port || 8080;
    document.getElementById("start-auto-kill").checked = currentSettings.auto_kill_port !== false;
    document.getElementById("set-gpu-history-hours").value = currentSettings.gpu_history_hours || 2;
    return currentSettings;
}

// model_params 按模型记忆启动参数的机制已废弃：参数随注册服务保存，不再单独记忆

async function saveSettings() {
    const data = {
        llama_server_path: document.getElementById("set-server-path").value,
        model_dir: document.getElementById("set-model-dir").value,
        host: "0.0.0.0",
        port: parseInt(document.getElementById("set-port").value) || 8080,
        auto_kill_port: document.getElementById("start-auto-kill").checked,
        gpu_history_hours: parseFloat(document.getElementById("set-gpu-history-hours").value) || 2,
    };
    await api("POST", "/api/settings", data);
    loadGpuStatus();
    alert("设置已保存");
}

async function detectLlamaCpp() {
    const btn = document.getElementById("detect-llama-cpp-btn");
    const status = document.getElementById("detect-llama-cpp-status");
    const oldText = btn.textContent;
    btn.disabled = true;
    btn.textContent = "检测中...";
    status.classList.remove("error");
    status.style.display = "block";
    status.textContent = "正在检索环境变量和 PATH...";
    try {
        const data = await api("GET", "/api/detect-llama-cpp");
        if (data.found) {
            document.getElementById("set-server-path").value = data.path;
            const execText = data.executable ? "可执行" : "已存在但不可执行";
            status.textContent = `已检测到 ${execText} 的 llama-server：${data.path}（来源：${data.source}）`;
            if (!data.executable) {
                status.classList.add("error");
            }
        } else if (data.env_matches && data.env_matches.length) {
            status.classList.add("error");
            status.textContent = `检测到相关环境变量 ${data.env_matches.join(", ")}，但未找到 llama-server 可执行文件`;
        } else {
            status.classList.add("error");
            status.textContent = "未在环境变量或 PATH 中检测到 llama.cpp / llama-server";
        }
    } catch (e) {
        status.classList.add("error");
        status.textContent = `检测失败：${e.message}`;
    } finally {
        btn.disabled = false;
        btn.textContent = oldText;
    }
}

// ── 模型扫描 ──────────────────────────────────────────

async function loadModels() {
    const data = await api("GET", "/api/models");
    const select = document.getElementById("svc-llama-model");
    const previousValue = select.value;
    // 清空选项
    select.innerHTML = "";
    if (data.models.length === 0) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "-- 未找到 GGUF 模型 --";
        select.appendChild(opt);
    } else {
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "-- 选择模型 --";
        select.appendChild(placeholder);
        data.models.forEach(m => {
            const opt = document.createElement("option");
            opt.value = m.path;
            // 显示文件名 + 大小
            const sizeMB = (m.size / 1024 / 1024).toFixed(0);
            opt.textContent = `${m.name} (${sizeMB} MB)`;
            select.appendChild(opt);
        });
    }
    if (previousValue && Array.from(select.options).some(opt => opt.value === previousValue)) {
        select.value = previousValue;
    }
}

function onServiceTypeChange() {
    const checked = document.querySelector('input[name="svc-type"]:checked');
    const type = checked ? checked.value : "llama";
    const isLlama = type === "llama";
    document.querySelectorAll(".svc-llama-field").forEach(el => {
        el.style.display = isLlama ? "" : "none";
    });
    document.querySelectorAll(".svc-vllm-field").forEach(el => {
        el.style.display = isLlama ? "none" : "";
    });
    document.getElementById("custom-service-save-btn").textContent = editingCustomServiceId ? "更新服务" : "保存服务";
}

function resetServiceForm() {
    editingCustomServiceId = "";
    document.getElementById("custom-service-id").value = "";
    document.getElementById("svc-llama-model").value = "";
    document.getElementById("svc-llama-port").value = currentSettings.port || 8083;
    document.getElementById("svc-llama-extra").value = "";
    document.getElementById("custom-service-name").value = "";
    document.getElementById("vllm-repo").value = "";
    document.getElementById("custom-service-command").value = "";
    document.querySelectorAll(".start-gpu").forEach(input => { input.checked = false; });
    document.getElementById("custom-service-save-btn").textContent = "保存服务";
    onVllmRepositoryChange();
}

async function loadVllmRepositories() {
    const data = await api("GET", "/api/model-repositories");
    modelRepositories = data.repositories || [];
    const select = document.getElementById("vllm-repo");
    const previousValue = select.value;
    select.innerHTML = "";
    if (!modelRepositories.length) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "-- 未找到全量仓库目录 --";
        select.appendChild(opt);
    } else {
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "-- 选择仓库模型 --";
        select.appendChild(placeholder);
        modelRepositories.forEach(repo => {
            const opt = document.createElement("option");
            opt.value = repo.path;
            opt.textContent = repo.display_name || repo.name;
            select.appendChild(opt);
        });
    }
    if (previousValue && Array.from(select.options).some(opt => opt.value === previousValue)) {
        select.value = previousValue;
    }
    onVllmRepositoryChange();
}

function onVllmRepositoryChange() {
    const selectedPath = document.getElementById("vllm-repo").value;
    const repo = modelRepositories.find(item => item.path === selectedPath);
    const pathEl = document.getElementById("vllm-repo-path");
    const nameInput = document.getElementById("custom-service-name");
    const commandInput = document.getElementById("custom-service-command");
    if (!repo) {
        pathEl.textContent = modelRepositories.length ? "未选择仓库模型" : "暂无可用仓库模型";
        commandInput.placeholder = "python -m vllm.entrypoints.openai.api_server --model /path/to/repo --host 0.0.0.0 --port 8085";
        return;
    }
    pathEl.textContent = repo.path;
    if (!editingCustomServiceId && !nameInput.value.trim()) {
        nameInput.value = repo.display_name || repo.name;
    }
    commandInput.placeholder = `python -m vllm.entrypoints.openai.api_server --model ${repo.path} --host 0.0.0.0 --port 8085`;
}

async function loadCustomServices() {
    const serviceData = await api("GET", "/api/custom-services");
    customServices = serviceData.services || [];
    renderRegisteredServices();
    renderLaunchServices();
}

function serviceTypeBadge(type) {
    if (type === "llama") return "llama.cpp";
    return type || "vllm";
}

// 已注册服务列表（注册列表：仅编辑/删除）
function renderRegisteredServices() {
    const wrap = document.getElementById("registered-service-list");
    if (!customServices.length) {
        wrap.className = "custom-service-empty";
        wrap.innerHTML = "暂无已注册服务";
        return;
    }
    wrap.className = "";
    wrap.innerHTML = customServices.map(service => {
        const detail = service.service_type === "llama"
            ? (service.model || "")
            : (service.command || "");
        return `
        <div class="custom-service-row">
            <strong title="${escapeHtml(service.name || "")}">${escapeHtml(service.name || "Unknown")}</strong>
            <span style="font-size:0.82em; color:#aaa;">${escapeHtml(serviceTypeBadge(service.service_type))} :${escapeHtml(service.port || "-")}</span>
            <code title="${escapeHtml(detail)}">${escapeHtml(detail)}</code>
            <div class="custom-service-actions">
                <button class="btn-secondary" onclick="editService('${escapeHtml(service.id)}')">编辑</button>
                <button class="btn-danger" onclick="deleteService('${escapeHtml(service.id)}')">删除</button>
            </div>
        </div>`;
    }).join("");
}

// 启动/运行中列表（启动列表：按运行状态切换按钮）
function renderLaunchServices() {
    const wrap = document.getElementById("launch-service-list");
    if (!customServices.length) {
        wrap.className = "custom-service-empty";
        wrap.innerHTML = "暂无已注册服务";
        return;
    }
    // service_id -> 运行中的受管进程
    const runningMap = {};
    (managedProcessRecords || []).forEach(proc => {
        if (proc && proc.service_id && proc.running !== false) {
            runningMap[proc.service_id] = proc;
        }
    });
    wrap.className = "";
    wrap.innerHTML = customServices.map(service => {
        const kind = service.service_type === "llama" ? "llama" : "custom";
        const run = runningMap[service.id];
        const pidText = run
            ? `PID ${escapeHtml(run.pid)}`
            : `<span style="color:#7d8ba3;">未运行</span>`;
        const actions = run
            ? `<div class="custom-service-actions">
                <button class="btn-danger" onclick="stopManagedProcess(${Number(run.pid)})">停止</button>
                <button class="btn-warning" onclick="restartManagedProcess(${Number(run.pid)})">重启</button>
                <button class="btn-primary" onclick="openManagedWebUI(${Number(run.pid)})">打开</button>
               </div>`
            : `<div class="custom-service-actions">
                <button class="btn-success" onclick="startRegisteredService('${escapeHtml(service.id)}', '${escapeHtml(kind)}')">启动</button>
               </div>`;
        return `
        <div class="custom-service-row">
            <strong title="${escapeHtml(service.name || "")}">${escapeHtml(service.name || "Unknown")}</strong>
            <span style="font-size:0.85em; color:#aaa;">${pidText}</span>
            <span style="font-size:0.85em;">:${escapeHtml(service.port || "-")} · ${escapeHtml(serviceTypeBadge(service.service_type))}</span>
            ${actions}
        </div>`;
    }).join("");
}

function editService(serviceId) {
    const service = customServices.find(s => s.id === serviceId);
    if (!service) {
        showError("服务不存在");
        return;
    }
    editingCustomServiceId = service.id;
    document.getElementById("custom-service-id").value = service.id;
    document.getElementById("custom-service-name").value = service.name || "";
    // 按类型切换字段并回填
    const isLlama = service.service_type === "llama";
    const radio = document.querySelector(`input[name="svc-type"][value="${isLlama ? "llama" : "vllm"}"]`);
    if (radio) radio.checked = true;
    onServiceTypeChange();
    if (isLlama) {
        document.getElementById("svc-llama-model").value = service.model || "";
        document.getElementById("svc-llama-port").value = service.port || 8083;
        document.getElementById("svc-llama-extra").value = service.extra_args || "";
        const gpus = Array.isArray(service.gpu_indexes) ? service.gpu_indexes : [];
        document.querySelectorAll(".start-gpu").forEach(input => {
            input.checked = gpus.includes(parseInt(input.value));
        });
    } else {
        document.getElementById("custom-service-command").value = service.command || "";
        const repo = modelRepositories.find(item => service.command && service.command.includes(item.path));
        if (repo) {
            document.getElementById("vllm-repo").value = repo.path;
        }
        onVllmRepositoryChange();
    }
    document.getElementById("custom-service-save-btn").textContent = "更新服务";
}

async function saveService() {
    const id = document.getElementById("custom-service-id").value || editingCustomServiceId;
    const name = document.getElementById("custom-service-name").value.trim();
    const type = document.querySelector('input[name="svc-type"]:checked').value;
    let payload;
    if (type === "llama") {
        const model = document.getElementById("svc-llama-model").value.trim();
        if (!model) {
            showError("请选择模型");
            return;
        }
        payload = {
            service_type: "llama",
            name,
            model,
            port: parseInt(document.getElementById("svc-llama-port").value) || 8080,
            extra_args: document.getElementById("svc-llama-extra").value,
            gpu_indexes: selectedGpuIndexes(),
        };
    } else {
        const command = document.getElementById("custom-service-command").value.trim();
        if (!command) {
            showError("请输入启动命令");
            return;
        }
        payload = { service_type: "vllm", name, command };
    }
    if (id) payload.id = id;
    try {
        await api("POST", "/api/custom-services", payload);
        resetServiceForm();
        await loadCustomServices();
    } catch (e) {}
}

async function startRegisteredService(serviceId, kind) {
    try {
        const result = await api("POST", "/api/start", {
            model: `${kind}:${serviceId}`,
            host: "0.0.0.0",
            auto_kill_port: document.getElementById("start-auto-kill").checked,
            incremental_start: document.getElementById("start-incremental").checked,
        });
        const feedback = document.getElementById("start-feedback");
        feedback.style.display = "block";
        feedback.innerHTML = `<strong>已提交启动</strong> PID ${escapeHtml(result.pid)} · Port ${escapeHtml(result.port || "-")}。如服务仍在加载，请查看下方服务日志。`;
        await loadGpuStatus();
        await loadManagedProcesses();
        const logSelect = document.getElementById("log-process-select");
        if (result.pid) {
            logSelect.value = String(result.pid);
        }
        await loadLogs();
    } catch (e) {}
}

async function deleteService(serviceId) {
    const service = customServices.find(s => s.id === serviceId);
    const label = service ? service.name : serviceId;
    if (!confirm(`删除服务 ${label}？`)) {
        return;
    }
    try {
        await api("DELETE", `/api/custom-services/${encodeURIComponent(serviceId)}`);
        if (editingCustomServiceId === serviceId) {
            resetServiceForm();
        }
        await loadCustomServices();
    } catch (e) {}
}

// ── GPU 监控 ──────────────────────────────────────────

function initGpuCardsPerRow() {
    const saved = localStorage.getItem("gpu_cards_per_row") || "auto";
    const select = document.getElementById("gpu-cards-per-row");
    select.value = ["auto", "2", "3", "4"].includes(saved) ? saved : "auto";
    applyGpuGridColumns(select.value);
}

function setGpuCardsPerRow() {
    const value = document.getElementById("gpu-cards-per-row").value;
    localStorage.setItem("gpu_cards_per_row", value);
    applyGpuGridColumns(value);
}

function applyGpuGridColumns(value) {
    const grid = document.getElementById("gpu-grid");
    const waveGrid = document.getElementById("gpu-wave-grid");
    grid.className = "gpu-grid";
    waveGrid.className = "gpu-wave-grid";
    if (["2", "3", "4"].includes(value)) {
        grid.classList.add(`cols-${value}`);
        waveGrid.classList.add(`cols-${value}`);
    }
}

async function loadGpuStatus() {
    try {
        const data = await api("GET", "/api/gpus");
        updateGpuUI(data);
    } catch (e) {
        updateGpuUI({ ok: false, error: e.message, gpus: [] });
    }
}

function updateGpuUI(data) {
    const errorBox = document.getElementById("gpu-error");
    const waveGrid = document.getElementById("gpu-wave-grid");
    const grid = document.getElementById("gpu-grid");
    const tbody = document.getElementById("gpu-process-body");
    const gpus = Array.isArray(data.gpus) ? data.gpus : [];
    const managedProcesses = Array.isArray(data.managed_processes) ? data.managed_processes : [];
    const historyHours = Number(data.history_hours || currentSettings.gpu_history_hours || 2);

    currentGpuIndexes = gpus.map(gpu => Number(gpu.index));
    if (managedProcesses.length) {
        managedProcessRecords = managedProcesses;
        updateLogProcessSelect();
    }
    updateStartGpuList(gpus);

    if (data.error) {
        errorBox.textContent = data.stale ? `当前 GPU 状态不可用，正在显示本地历史波形: ${data.error}` : data.error;
        errorBox.style.display = "block";
    } else {
        errorBox.textContent = "";
        errorBox.style.display = "none";
    }

    if (gpus.length === 0) {
        waveGrid.innerHTML = `<div class="gpu-empty">${data.ok === false ? "暂无可用 GPU 波形数据" : "未检测到 GPU"}</div>`;
        grid.innerHTML = `<div class="gpu-empty">${data.ok === false ? "暂无可用 GPU 数据" : "未检测到 GPU"}</div>`;
    } else {
        waveGrid.innerHTML = gpus.map(gpu => `
            <div class="gpu-wave-card">
                <div class="gpu-wave-title">
                    <strong>GPU ${escapeHtml(gpu.index)}</strong>
                    <span title="${escapeHtml(gpu.name)}">${escapeHtml(gpu.name || "Unknown")}</span>
                </div>
                <canvas class="gpu-wave-canvas" data-gpu-index="${escapeHtml(gpu.index)}"></canvas>
            </div>
        `).join("");
        drawGpuWaveforms(gpus, historyHours);

        grid.innerHTML = gpus.map(gpu => {
            const util = clampPercent(gpu.gpu_util);
            const hasMem = gpu.used_mem !== null && gpu.used_mem !== undefined && gpu.total_mem !== null && gpu.total_mem !== undefined;
            const memText = hasMem ? `${formatMem(gpu.used_mem)} / ${formatMem(gpu.total_mem)}` : "-";
            const users = Array.isArray(gpu.users) && gpu.users.length > 0 ? gpu.users.join(", ") : "None";
            return `
                <div class="gpu-card">
                    <div class="gpu-card-title">
                        <strong>GPU ${escapeHtml(gpu.index)}${gpu.stale ? " · History" : ""}</strong>
                        <span title="${escapeHtml(gpu.name)}">${escapeHtml(gpu.name || "Unknown")}</span>
                    </div>
                    <div class="gpu-metrics">
                        <div class="gpu-metric"><label>Util</label><span>${util}%</span></div>
                        <div class="gpu-metric"><label>Memory</label><span title="${escapeHtml(memText)}">${escapeHtml(memText)}</span></div>
                        <div class="gpu-metric"><label>Temp</label><span>${gpu.temperature === null || gpu.temperature === undefined ? "-" : escapeHtml(gpu.temperature) + " °C"}</span></div>
                        <div class="gpu-metric"><label>Processes</label><span>${escapeHtml(gpu.process_count ?? 0)}</span></div>
                        <div class="gpu-metric"><label>Users</label><span title="${escapeHtml(users)}">${escapeHtml(users)}</span></div>
                        <div class="gpu-metric"><label>Driver</label><span title="${escapeHtml(gpu.driver_version)}">${escapeHtml(gpu.driver_version || "-")}</span></div>
                    </div>
                    <div class="gpu-util-bar" title="GPU Util ${util}%">
                        <div class="gpu-util-fill" style="width:${util}%"></div>
                    </div>
                </div>
            `;
        }).join("");
    }

    if (managedProcesses.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" class="gpu-empty">暂无受管进程</td></tr>`;
        return;
    }

    tbody.innerHTML = managedProcesses.map(proc => `
        <tr>
            <td>${escapeHtml(proc.gpu ?? "-")}</td>
            <td title="${escapeHtml(proc.gpu_name || "")}">${escapeHtml(proc.gpu_name || "-")}</td>
            <td>${proc.gpu_util === null || proc.gpu_util === undefined ? "-" : clampPercent(proc.gpu_util) + "%"}</td>
            <td>${escapeHtml(proc.pid ?? "-")}</td>
            <td>${escapeHtml(formatMem(proc.used_mem))}</td>
            <td>${escapeHtml(formatMem(proc.total_mem))}</td>
            <td>${proc.temperature === null || proc.temperature === undefined ? "-" : escapeHtml(proc.temperature) + " °C"}</td>
            <td title="${escapeHtml(proc.command || "")}">${escapeHtml(proc.model_name || "Unknown")}</td>
            <td>
                <button class="btn-primary" onclick="openManagedWebUI(${Number(proc.pid)})">Open</button>
                <button class="btn-danger" onclick="stopManagedProcess(${Number(proc.pid)})">Stop</button>
                <button class="btn-warning" onclick="restartManagedProcess(${Number(proc.pid)})">Restart</button>
            </td>
        </tr>
    `).join("");
}

function updateStartGpuList(gpus) {
    const wrap = document.getElementById("start-gpu-list");
    const checked = new Set(
        Array.from(wrap.querySelectorAll("input[type='checkbox']:checked")).map(input => input.value)
    );
    if (!gpus.length) {
        wrap.innerHTML = `<span style="color:#888;">未检测到 GPU，不设置 CUDA_VISIBLE_DEVICES</span>`;
        return;
    }
    wrap.innerHTML = gpus.map(gpu => {
        const value = String(gpu.index);
        const isChecked = checked.has(value) ? "checked" : "";
        return `
            <label class="checkbox-row" style="margin-top:0;">
                <input type="checkbox" class="start-gpu" value="${escapeHtml(value)}" ${isChecked}>
                <span>GPU ${escapeHtml(gpu.index)}</span>
            </label>
        `;
    }).join("");
}

function selectedGpuIndexes() {
    return Array.from(document.querySelectorAll(".start-gpu:checked"))
        .map(input => parseInt(input.value))
        .filter(n => Number.isInteger(n) && n >= 0);
}

function drawGpuWaveforms(gpus, historyHours) {
    const now = Date.now() / 1000;
    const startTs = now - historyHours * 3600;
    gpus.forEach(gpu => {
        const canvas = document.querySelector(`canvas[data-gpu-index="${gpu.index}"]`);
        if (!canvas) return;
        drawGpuWaveform(canvas, gpu, startTs, now);
    });
}

function drawGpuWaveform(canvas, gpu, startTs, endTs) {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const width = Math.max(1, Math.floor(rect.width * dpr));
    const height = Math.max(1, Math.floor(rect.height * dpr));
    if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
    }

    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = "#10161d";
    ctx.fillRect(0, 0, width, height);

    const left = 44 * dpr;
    const right = 10 * dpr;
    const top = 10 * dpr;
    const bottom = 26 * dpr;
    const plotW = width - left - right;
    const plotH = height - top - bottom;

    ctx.font = `${11 * dpr}px SF Mono, Consolas, monospace`;
    ctx.textBaseline = "middle";
    ctx.strokeStyle = "#263247";
    ctx.fillStyle = "#8fa1bd";
    ctx.lineWidth = 1 * dpr;

    [0, 50, 100].forEach(value => {
        const y = top + plotH - (value / 100) * plotH;
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.lineTo(width - right, y);
        ctx.stroke();
        ctx.fillText(String(value), 8 * dpr, y);
    });

    ctx.textBaseline = "top";
    ctx.fillText(formatClock(startTs), left, height - bottom + 7 * dpr);
    const endText = formatClock(endTs);
    const endWidth = ctx.measureText(endText).width;
    ctx.fillText(endText, width - right - endWidth, height - bottom + 7 * dpr);

    const history = Array.isArray(gpu.history) ? gpu.history : [];
    const points = history
        .filter(p => p.timestamp >= startTs && p.timestamp <= endTs)
        .map(p => ({
            x: left + ((p.timestamp - startTs) / (endTs - startTs)) * plotW,
            y: top + plotH - (clampPercent(p.gpu_util) / 100) * plotH,
        }));

    if (points.length === 0) {
        ctx.fillStyle = "#6f7d92";
        ctx.textAlign = "center";
        ctx.fillText("等待采样", left + plotW / 2, top + plotH / 2);
        ctx.textAlign = "left";
        return;
    }

    ctx.strokeStyle = "#52d273";
    ctx.lineWidth = 2 * dpr;
    ctx.beginPath();
    points.forEach((point, i) => {
        if (i === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
    });
    ctx.stroke();

    const last = points[points.length - 1];
    ctx.fillStyle = "#6be675";
    ctx.beginPath();
    ctx.arc(last.x, last.y, 3 * dpr, 0, Math.PI * 2);
    ctx.fill();
}

// ── 启动 / 停止 / 重启 ───────────────────────────────

// 一次性 llama 启动已废弃：所有启动都走 startRegisteredService（基于已注册服务）

// 基于「当前实例」的一次性 stop/restart/openWebUI 已随启动改造废弃，统一用受管进程的 stop/restart/open

function openManagedWebUI(pid) {
    window.open(`/llama-process/${pid}/`, "_blank");
}

async function stopManagedProcess(pid) {
    try {
        await api("POST", "/api/stop", { pid });
        loadGpuStatus();
        loadManagedProcesses();
        loadLogs();
    } catch (e) {}
}

async function restartManagedProcess(pid) {
    try {
        await api("POST", "/api/restart", { pid });
        loadGpuStatus();
        loadManagedProcesses();
        loadLogs();
    } catch (e) {}
}

// ── 日志 ──────────────────────────────────────────────

async function loadManagedProcesses() {
    try {
        const data = await api("GET", "/api/managed-processes");
        managedProcessRecords = data.processes || [];
        updateLogProcessSelect();
        renderLaunchServices();
    } catch (e) {}
}

function updateLogProcessSelect() {
    const select = document.getElementById("log-process-select");
    const current = select.value;
    select.innerHTML = "";
    const defaultOpt = document.createElement("option");
    defaultOpt.value = "";
    defaultOpt.textContent = "最新受管进程 / 默认日志";
    select.appendChild(defaultOpt);
    managedProcessRecords.forEach(proc => {
        const opt = document.createElement("option");
        opt.value = String(proc.pid);
        const state = proc.running ? "Running" : "Stopped";
        const type = (proc.service_type || proc.service_kind || "llama").toUpperCase();
        opt.textContent = `PID ${proc.pid} · ${type} · ${proc.display_name || proc.model_name || "Unknown"} · :${proc.port} · ${state}`;
        select.appendChild(opt);
    });
    if (Array.from(select.options).some(opt => opt.value === current)) {
        select.value = current;
    }
}

async function loadLogs() {
    try {
        await loadManagedProcesses();
        const pid = document.getElementById("log-process-select").value;
        const path = pid ? `/api/logs?pid=${encodeURIComponent(pid)}` : "/api/logs";
        const data = await api("GET", path);
        document.getElementById("log-area").value = data.logs || "";
    } catch (e) {}
}

// ── 下载 ──────────────────────────────────────────────

async function startDownload() {
    const repo = document.getElementById("dl-repo").value.trim();
    const filename = document.getElementById("dl-filename").value.trim();
    const force_download = document.getElementById("dl-force").checked;
    const btn = document.getElementById("btn-download");
    const statusText = document.getElementById("dl-status-text");
    if (!repo) {
        showError("请输入仓库名");
        return;
    }
    btn.disabled = true;
    statusText.textContent = "正在创建下载任务...";
    try {
        const result = await api("POST", "/api/download", { repo, filename, force_download });
        statusText.textContent = `已新增下载任务：${downloadLabel(result.task || { repo, filename })}`;
        await loadDownloadStatus();
        const logSelect = document.getElementById("download-log-select");
        if (result.id) {
            logSelect.value = result.id;
        }
        await loadDownloadLogs();
    } catch (e) {
        statusText.textContent = "";
    } finally {
        btn.disabled = false;
    }
}

async function cancelDownload(taskId) {
    try {
        await api("POST", "/api/download/cancel", { task_id: taskId });
        await loadDownloadStatus();
        await loadDownloadLogs();
    } catch (e) {}
}

async function loadDownloadStatus() {
    try {
        const data = await api("GET", "/api/download/status");
        const previousDone = new Set(completedDownloadTaskIds);
        updateDownloadUI(data);
        const hasNewCompleted = downloadTasks.some(task =>
            task.done && !task.running && !task.error && !previousDone.has(task.id)
        );
        if (hasNewCompleted) {
            loadModels();
            loadVllmRepositories();
        }
    } catch (e) {}
}

function downloadLabel(data) {
    const lbl = data.filename ? `${data.repo || ""} / ${data.filename}` : `${data.repo || ""} 全量`;
    return data.target_dir ? `${lbl} → ${data.target_dir}` : lbl;
}

function downloadState(task) {
    if (task.running && task.cancel_requested) return { text: "Cancelling", className: "badge badge-warning" };
    if (task.running) return { text: "Downloading", className: "badge badge-running" };
    if (task.done && task.error) return { text: "Error", className: "badge badge-danger" };
    if (task.done) return { text: "Done", className: "badge badge-running" };
    return { text: "Idle", className: "badge badge-stopped" };
}

function progressMeta(task) {
    if (task.progress && task.progress.total > 0) {
        return {
            pct: task.done && !task.error ? 100 : task.progress.percentage,
            text: `${task.progress.percentage}%`,
            size: `${task.progress.downloaded_mb} MB / ${task.progress.total_mb} MB`,
        };
    }
    if (task.running) {
        return { pct: 0, text: "准备中...", size: "" };
    }
    return { pct: 0, text: "-", size: "" };
}

function updateDownloadUI(data) {
    downloadTasks = Array.isArray(data.downloads) ? data.downloads : [];
    downloadTasks.forEach(task => {
        if (task.done && !task.running) {
            completedDownloadTaskIds.add(task.id);
        }
    });
    updateDownloadTaskList();
    updateDownloadLogSelect();
}

function updateDownloadTaskList() {
    const wrap = document.getElementById("download-task-list");
    if (!downloadTasks.length) {
        wrap.innerHTML = `<div class="custom-service-empty">暂无下载任务</div>`;
        return;
    }
    wrap.innerHTML = downloadTasks.map(task => {
        const state = downloadState(task);
        const progress = progressMeta(task);
        const errorText = task.error ? ` · ${task.error}` : "";
        return `
            <div class="download-task-row">
                <div class="download-task-title">
                    <strong title="${escapeHtml(downloadLabel(task))}">${escapeHtml(task.label || downloadLabel(task))}</strong>
                    <span title="${escapeHtml(task.target_dir || "")}">${escapeHtml(task.target_dir || "-")}${escapeHtml(errorText)}</span>
                </div>
                <div class="download-progress">
                    <div class="download-progress-track">
                        <div class="download-progress-fill" style="width:${progress.pct}%"></div>
                    </div>
                    <div class="download-progress-meta">
                        <span>${escapeHtml(progress.text)}</span>
                        <span>${escapeHtml(progress.size)}</span>
                    </div>
                </div>
                <span class="${state.className}">${state.text}</span>
                <div class="download-task-actions">
                    <button class="btn-secondary" onclick="selectDownloadLog('${escapeHtml(task.id)}')">Logs</button>
                    <button class="btn-danger" onclick="cancelDownload('${escapeHtml(task.id)}')" ${task.running && !task.cancel_requested ? "" : "disabled"}>Cancel</button>
                </div>
            </div>
        `;
    }).join("");
}

function updateDownloadLogSelect() {
    const select = document.getElementById("download-log-select");
    const current = select.value;
    select.innerHTML = `<option value="">最新下载任务</option>`;
    downloadTasks.forEach(task => {
        const opt = document.createElement("option");
        opt.value = task.id;
        const state = downloadState(task).text;
        opt.textContent = `${state} · ${task.label || downloadLabel(task)}`;
        select.appendChild(opt);
    });
    if (Array.from(select.options).some(opt => opt.value === current)) {
        select.value = current;
    }
}

async function selectDownloadLog(taskId) {
    document.getElementById("download-log-select").value = taskId;
    await loadDownloadLogs();
}

// ── 下载日志 ──────────────────────────────────────────

async function loadDownloadLogs() {
    try {
        const taskId = document.getElementById("download-log-select").value;
        const path = taskId ? `/api/download/logs?task_id=${encodeURIComponent(taskId)}` : "/api/download/logs";
        const data = await api("GET", path);
        if (Array.isArray(data.downloads)) {
            downloadTasks = data.downloads;
            updateDownloadTaskList();
            updateDownloadLogSelect();
            if (taskId) {
                document.getElementById("download-log-select").value = taskId;
            }
        }
        document.getElementById("dl-log-area").value = data.logs || "";
    } catch (e) {}
}

// ── 初始化 ────────────────────────────────────────────

document.addEventListener("DOMContentLoaded", () => {
    initGpuCardsPerRow();
    loadSettings()
        .then(() => Promise.all([loadModels(), loadVllmRepositories(), loadCustomServices()]))
        .then(() => onServiceTypeChange());
    loadGpuStatus();
    loadManagedProcesses();
    loadLogs();
    loadDownloadLogs();

    // 自动刷新
    setInterval(loadGpuStatus, 5000);
    setInterval(loadLogs, 5000);
    setInterval(loadDownloadStatus, 3000);
    setInterval(loadDownloadLogs, 5000);
    loadDownloadStatus();
});
</script>

</body>
</html>
